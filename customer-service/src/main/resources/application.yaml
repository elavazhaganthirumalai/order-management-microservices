spring:
  application:
    name: customer-service

  h2:
    console:
      enabled: true

  datasource:
    url: jdbc:h2:mem:customerdb
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: 8081

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka